<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Uninstall Doing It</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { background: transparent; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Inter', sans-serif; -webkit-app-region: drag; color: #e8e8ec; user-select: none; }
    .uninst-container { width: 380px; background: rgba(22, 22, 24, 0.85); border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 24px; box-shadow: 0 25px 60px rgba(0,0,0,0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); text-align: center; }
    .uninst-title { font-weight: 600; font-size: 1.15rem; margin-bottom: 12px; }
    .uninst-desc { color: rgba(232, 232, 236, 0.6); font-size: 0.95rem; line-height: 1.5; margin-bottom: 24px; }
    .uninst-actions { display: flex; gap: 12px; justify-content: center; -webkit-app-region: no-drag; }
    .btn { padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 500; flex: 1; transition: all 0.2s; font-family: 'Inter', sans-serif; outline: none; }
    .btn-yes { background: #e06060; color: #fff; border: none; }
    .btn-yes:hover { background: #f07070; box-shadow: 0 4px 12px rgba(224,96,96,0.2); }
    .btn-no { background: rgba(255,255,255,0.05); color: #e8e8ec; border: 1px solid rgba(255,255,255,0.1); }
    .btn-no:hover { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="uninst-container">
    <div class="uninst-title">Uninstalling Doing It</div>
    <div class="uninst-desc">We will strictly miss your productive sessions.<br><br>Do you want to permanently delete all your saved notes, tasks, habits, and application settings?</div>
    <div class="uninst-actions">
      <button class="btn btn-yes" onclick="require('electron').ipcRenderer.send('uninstall-response', true)">Yes, Delete Data</button>
      <button class="btn btn-no" onclick="require('electron').ipcRenderer.send('uninstall-response', false)">Keep Data</button>
    </div>
  </div>
</body>
</html>
